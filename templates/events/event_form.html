{% extends "base.html" %}

{% block title %}{% if form.instance.pk %}Modifica evento{% else %}Nuovo evento{% endif %}{% endblock %}

{% block content %}
<div class="card form-card">
    <div class="card-body p-4">
        <h1 class="h4 mb-4">
            {% if form.instance.pk %}Modifica evento{% else %}Nuovo evento{% endif %}
        </h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-accent">Salva</button>
            <a href="{% url 'event-list' %}" class="btn btn-outline-secondary">Annulla</a>
        </form>
    </div>
</div>
{% endblock %}
