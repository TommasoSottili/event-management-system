{% extends "base.html" %}

{% block title %}Elimina evento{% endblock %}

{% block content %}
<div class="card form-card">
    <div class="card-body p-4">
        <h1 class="h4 mb-3">Elimina evento</h1>
        <p>Sei sicuro di voler eliminare <strong>{{ event.title }}</strong>?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Si, elimina</button>
            <a href="{% url 'event-detail' event.pk %}" class="btn btn-outline-secondary">Annulla</a>
        </form>
    </div>
</div>
{% endblock %}
